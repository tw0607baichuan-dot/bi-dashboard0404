<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Demo 05 — 数据瀑布井</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050910;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
.stage{width:960px;height:600px;position:relative;overflow:hidden}
.label{position:absolute;top:12px;left:16px;font-family:'Orbitron',monospace;font-size:11px;color:rgba(0,240,255,0.4);letter-spacing:3px;z-index:20}
.card{position:absolute;top:50%;width:340px;height:320px;border:1.5px solid rgba(0,195,255,0.25);border-radius:8px;background:rgba(6,12,28,0.95);backdrop-filter:blur(8px);z-index:10;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:14px;letter-spacing:2px;color:rgba(0,240,255,0.3)}
.card.l{left:80px;transform:translateY(-50%)}
.card.r{right:80px;transform:translateY(-50%);border-color:rgba(148,102,255,0.25);color:rgba(148,102,255,0.3)}
/* 底部能量池 */
.pool{position:absolute;bottom:10px;left:10%;right:10%;height:8px;border-radius:4px;pointer-events:none;z-index:2}
.pool-fill{position:absolute;inset:0;border-radius:4px;background:linear-gradient(90deg,rgba(0,240,255,0.12),rgba(0,195,255,0.06) 30%,rgba(148,102,255,0.06) 70%,rgba(148,102,255,0.12));box-shadow:0 0 16px rgba(0,195,255,0.06);animation:poolFlow 8s ease-in-out infinite}
@keyframes poolFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.pool-glow{position:absolute;bottom:8px;left:15%;right:15%;height:40px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,195,255,0.05),transparent 60%);filter:blur(8px);pointer-events:none}
/* 瀑布粒子 */
.wf-pt{position:absolute;border-radius:50%;pointer-events:none;z-index:1}
@keyframes wfFall{0%{top:-2%;opacity:0}5%{opacity:var(--wo,0.3)}90%{opacity:var(--wo2,0.15)}100%{top:98%;opacity:0}}
/* 大亮粒 */
@keyframes wfBigFall{0%{top:-3%;opacity:0;box-shadow:0 0 4px var(--bc)}8%{opacity:0.8}50%{box-shadow:0 0 12px var(--bc),0 0 24px var(--bc2)}92%{opacity:0.4}100%{top:96%;opacity:0}}
/* 涟漪 */
.pool-ripple{position:absolute;bottom:12px;border-radius:50%;border:1px solid rgba(0,195,255,0.1);pointer-events:none}
@keyframes poolRipple{0%{width:8px;height:4px;opacity:0.4}100%{width:80px;height:20px;opacity:0}}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="label">05 — DATA WATERFALL WELL</div>
  <div class="card l">LOCAL COMMAND</div>
  <div class="card r">REMOTE LINK</div>
  <div class="pool"><div class="pool-fill"></div></div>
  <div class="pool-glow"></div>
</div>
<script>
var stage=document.getElementById('stage');
function rn(a,b){return Math.random()*(b-a)+a}
var W=960;
// 卡片遮蔽区
var cardL={x1:80,x2:420,y1:140,y2:460};
var cardR={x1:540,x2:880,y1:140,y2:460};
function inCard(x){return(x>cardL.x1&&x<cardL.x2)||(x>cardR.x1&&x<cardR.x2)}
// 瀑布粒子 x60
for(var i=0;i<60;i++){
  var pt=document.createElement('div');pt.className='wf-pt';
  var x=rn(5,95);
  var xPx=x/100*W;
  // 卡片区密度降低
  var skip=inCard(xPx)&&Math.random()<0.6;
  if(skip){x=Math.random()<0.5?rn(2,8):rn(92,98)}
  var sz=rn(1,2);
  var isLeft=x<50;
  var c=isLeft?'rgba(0,240,255,':'rgba(148,102,255,';
  var dur=rn(5,10);
  pt.style.cssText='left:'+x+'%;width:'+sz+'px;height:'+sz+'px;background:'+c+'0.4);box-shadow:0 0 2px '+c+'0.3);animation:wfFall '+dur+'s linear infinite '+(-rn(0,dur))+'s;--wo:'+rn(0.15,0.35)+';--wo2:'+rn(0.05,0.15);
  stage.appendChild(pt);
}
// 大亮粒 x4(间歇)
for(var i=0;i<4;i++){
  var pt=document.createElement('div');pt.className='wf-pt';
  var x=rn(10,90);
  var isLeft=x<50;
  var c1=isLeft?'#00f0ff':'#9466ff';
  var c2=isLeft?'rgba(0,240,255,0.4)':'rgba(148,102,255,0.4)';
  pt.style.cssText='left:'+x+'%;width:4px;height:4px;background:'+c1+';border-radius:50%;animation:wfBigFall '+(8+rn(0,6))+'s ease-in infinite '+(-rn(0,12))+'s;--bc:'+c1+';--bc2:'+c2;
  stage.appendChild(pt);
}
// 底部落点涟漪
for(var i=0;i<6;i++){
  var rip=document.createElement('div');rip.className='pool-ripple';
  rip.style.cssText='left:'+(15+rn(0,70))+'%;margin-left:-4px;animation:poolRipple '+(2+rn(0,2))+'s ease-out infinite '+(-rn(0,4))+'s';
  stage.appendChild(rip);
}
// 整体轻微摇摆
var css=document.createElement('style');
css.textContent='.wf-pt{animation-timing-function:linear}';
document.head.appendChild(css);
</script>
</body>
</html>
