<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>C. 地下城傳送門列 — High Drama</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#050910;font-family:'Noto Sans TC',sans-serif;color:#f4f9ff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

.panel{width:960px;height:420px;position:relative;background:rgba(6,12,28,0.94);border:1px solid rgba(0,195,255,0.28);border-radius:4px;padding:12px 18px;overflow:hidden;display:flex;flex-direction:column}
.panel::after{content:'';position:absolute;top:0;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,#00f0ff,#9466ff,transparent);opacity:0.35}
.pt{font-size:15px;font-weight:700;color:#00f0ff;letter-spacing:2px;font-family:'Orbitron',monospace;display:flex;align-items:center;gap:8px;margin-bottom:1px}
.pt::before{content:'';width:3px;height:13px;background:linear-gradient(180deg,#00f0ff,#9466ff);border-radius:2px;box-shadow:0 0 5px rgba(0,240,255,0.4)}
.pt .tag{font-size:9px;margin-left:auto;letter-spacing:1.5px;padding:2px 8px;border-radius:2px;color:#c080ff;border:1px solid rgba(192,128,255,0.3);background:rgba(148,102,255,0.06);animation:tagF 2s ease-in-out infinite}
@keyframes tagF{0%,100%{opacity:0.6}50%{opacity:1}}
.ps{font-size:10px;color:#8aa0c0;letter-spacing:1.5px;font-family:'Orbitron',monospace;margin-bottom:6px}
.scene{flex:1;position:relative;overflow:hidden}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinR{to{transform:rotate(-360deg)}}

/* 门拱/漩涡/降束/柱子/粒子 — 全用 position:absolute + placeCenter(margin居中) */
/* 动画只用 rotate / scale / opacity，绝不用 translate */
</style>
</head>
<body>
<div class="panel">
  <div class="pt"><span>C. 地下城傳送門列</span><span class="tag">&#10070; GATES OPENING T-10s</span></div>
  <div class="ps">DUNGEON PORTAL ARRAY — SPATIAL TEAR SEQUENCE / HIGH DRAMA</div>
  <div class="scene" id="sc"></div>
</div>

<script>
var D={labels:['W11','W12','W13','W14'],values:[1980,2140,1930,1320]};
var maxV=Math.max.apply(null,D.values);
var peakI=D.values.indexOf(maxV); // W12=2140, index 1
function fmt(v){return v.toLocaleString()}
function pct(v){return Math.round(v/maxV*100)}
function rn(a,b){return Math.random()*(b-a)+a}

var C1=['#00f0ff','#00c8ff','#0080ff','#9466ff'];
var C2=['#9466ff','#7050ff','#9466ff','#00f0ff'];

// 居中helper: margin负值法，动画安全
function pc(el,w,h){
  el.style.position='absolute';
  el.style.width=w+'px';el.style.height=h+'px';
  el.style.left='50%';el.style.top='50%';
  el.style.marginLeft=(-w/2)+'px';el.style.marginTop=(-h/2)+'px';
}

var sc=document.getElementById('sc');
var css='';

// ── 背景空间扭曲 ──
var warp=document.createElement('div');
warp.style.cssText='position:absolute;inset:0;pointer-events:none;overflow:hidden';
warp.innerHTML='<div style="position:absolute;left:50%;top:50%;width:900px;height:500px;margin-left:-450px;margin-top:-250px;border-radius:50%;background:radial-gradient(ellipse,rgba(148,102,255,0.06),transparent 55%);animation:warp 5s ease-in-out infinite"></div>';
css+='@keyframes warp{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.12);opacity:0.85}}';
sc.appendChild(warp);

// ── 底部场域 ──
var floor=document.createElement('div');
floor.style.cssText='position:absolute;bottom:0;left:0;right:0;height:50px;pointer-events:none;z-index:1';
floor.innerHTML='<div style="position:absolute;bottom:4px;left:3%;right:3%;height:2px;background:linear-gradient(90deg,transparent,rgba(148,102,255,0.35),rgba(0,240,255,0.2),rgba(148,102,255,0.35),transparent);box-shadow:0 0 16px rgba(148,102,255,0.12),0 0 32px rgba(148,102,255,0.04);animation:flP 2.5s ease-in-out infinite"></div><div style="position:absolute;bottom:1px;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.1),transparent);box-shadow:0 0 6px rgba(0,240,255,0.06)"></div>';
css+='@keyframes flP{0%,100%{opacity:0.4}50%{opacity:1}}';
sc.appendChild(floor);

// ── 共振波 x3 ──
for(var r=0;r<3;r++){
  var rip=document.createElement('div');
  rip.style.cssText='position:absolute;bottom:4px;left:50%;height:1px;width:30px;margin-left:-15px;border-radius:50%;background:rgba(148,102,255,0.2);pointer-events:none;animation:rip '+(3+r*0.5)+'s ease-out infinite '+(-r*1)+'s;z-index:1';
  sc.appendChild(rip);
}
css+='@keyframes rip{0%{transform:scaleX(1);opacity:0.5}100%{transform:scaleX(28);opacity:0}}';

// ── 门行 ──
var row=document.createElement('div');
row.style.cssText='display:flex;align-items:center;justify-content:center;gap:40px;height:100%;padding:6px 8px 22px;position:relative;z-index:3';

// 每扇门的启动等级 (用于差异化)
// W11=1980(92%), W12=2140(100%全开), W13=1930(90%), W14=1320(62%不稳定)
var gateConfig=[
  {phase:'高能',beamW:5,beamH:32,sparkN:8,archSpeed:[6,4,3,2.2],vortDur:2.2,fogOp:0.5,ringGlow:0.35},
  {phase:'全开',beamW:8,beamH:45,sparkN:12,archSpeed:[4.5,3,2.2,1.6],vortDur:1.5,fogOp:0.75,ringGlow:0.55},
  {phase:'充能',beamW:4,beamH:28,sparkN:7,archSpeed:[7,4.5,3.2,2.5],vortDur:2.5,fogOp:0.4,ringGlow:0.3},
  {phase:'不穩',beamW:3,beamH:20,sparkN:5,archSpeed:[8,5.5,4,3],vortDur:3,fogOp:0.25,ringGlow:0.2}
];

D.values.forEach(function(v,i){
  var p=pct(v)/100;
  var cfg=gateConfig[i];
  var boxSz=Math.round(105+50*p);
  var c=C1[i], c2=C2[i];
  var isOpen=(i===peakI);

  var unit=document.createElement('div');
  unit.style.cssText='display:flex;flex-direction:column;align-items:center;position:relative';

  var box=document.createElement('div');
  box.style.cssText='position:relative;width:'+boxSz+'px;height:'+boxSz+'px';

  // ═══ 门拱 4层 ═══
  // 拱1: 外环，粗实线，半圆
  var a1=boxSz+10;
  var arch1=document.createElement('div');
  pc(arch1,a1,a1);
  arch1.style.border=(isOpen?'3.5':'2.5')+'px solid '+c;
  arch1.style.borderBottomColor='transparent';
  arch1.style.borderRadius='50%';
  arch1.style.boxShadow='0 0 '+(isOpen?18:10)+'px '+c+'33';
  arch1.style.animation='spin '+cfg.archSpeed[0]+'s linear infinite, a1g'+i+' 2.5s ease-in-out infinite';
  arch1.innerHTML='<div style="position:absolute;top:-5px;left:50%;margin-left:-5px;width:10px;height:10px;border-radius:50%;background:'+c+';box-shadow:0 0 14px '+c+',0 0 30px '+c+'aa"></div><div style="position:absolute;bottom:-4px;left:50%;margin-left:-4px;width:8px;height:8px;border-radius:50%;background:'+c2+';box-shadow:0 0 10px '+c2+',0 0 20px '+c2+'88"></div>';
  box.appendChild(arch1);
  css+='@keyframes a1g'+i+'{0%,100%{box-shadow:0 0 '+(isOpen?18:10)+'px '+c+'33}50%{box-shadow:0 0 '+(isOpen?30:18)+'px '+c+'55}}';

  // 拱2: 虚线，反转
  var a2=boxSz+2;
  var arch2=document.createElement('div');
  pc(arch2,a2,a2);
  arch2.style.cssText+='border:1.5px dashed '+c+'44;border-bottom-color:transparent;border-radius:50%;animation:spinR '+cfg.archSpeed[1]+'s linear infinite';
  arch2.innerHTML='<div style="position:absolute;top:-2px;left:50%;margin-left:-2px;width:4px;height:4px;border-radius:50%;background:'+c+'88;box-shadow:0 0 6px '+c+'"></div>';
  box.appendChild(arch2);

  // 拱3: 点线
  var a3=boxSz-14;
  var arch3=document.createElement('div');
  pc(arch3,a3,a3);
  arch3.style.cssText+='border:1px dotted '+c+'33;border-radius:50%;animation:spin '+cfg.archSpeed[2]+'s linear infinite';
  box.appendChild(arch3);

  // 拱4: 最内细环
  var a4=boxSz-24;
  var arch4=document.createElement('div');
  pc(arch4,a4,a4);
  arch4.style.cssText+='border:0.5px solid '+c+'22;border-radius:50%;animation:spinR '+cfg.archSpeed[3]+'s linear infinite';
  box.appendChild(arch4);

  // ═══ 漩涡核心 — 多层深度 ═══
  var vSz=Math.round(boxSz*0.52);
  var vortex=document.createElement('div');
  pc(vortex,vSz,vSz);
  vortex.style.borderRadius='50%';
  vortex.style.overflow='hidden';
  vortex.style.zIndex='3';
  // 多层渐变叠加 = 深度感
  vortex.style.background='radial-gradient(circle, '+c+(isOpen?'44':'28')+' 0%, '+c+'18 30%, '+c+'0a 55%, rgba(5,9,16,0.9) 78%, rgba(3,5,10,0.95) 100%)';
  vortex.style.boxShadow='0 0 20px '+c+'2a, 0 0 36px '+c+'10, inset 0 0 20px '+c+'18, inset 0 0 40px rgba(0,0,0,0.5)';
  vortex.style.animation='vort'+i+' '+cfg.vortDur+'s ease-in-out infinite '+(-i*0.4)+'s';
  // scale only
  css+='@keyframes vort'+i+'{'+
    '0%,100%{transform:scale(1);box-shadow:0 0 20px '+c+'2a,0 0 36px '+c+'10,inset 0 0 20px '+c+'18,inset 0 0 40px rgba(0,0,0,0.5)}'+
    '35%{transform:scale('+(isOpen?1.1:1.05)+');box-shadow:0 0 30px '+c+'44,0 0 48px '+c+'18,inset 0 0 26px '+c+'22,inset 0 0 44px rgba(0,0,0,0.4)}'+
    '70%{transform:scale('+(isOpen?0.95:0.97)+');box-shadow:0 0 22px '+c+'22,0 0 38px '+c+'0e,inset 0 0 22px '+c+'15,inset 0 0 42px rgba(0,0,0,0.5)}}';

  // 漩涡内圈1 — 虚线反转
  var vi1=document.createElement('div');
  vi1.style.cssText='position:absolute;inset:12%;border-radius:50%;border:1.5px dashed '+c+'44;animation:spinR '+(cfg.vortDur*0.8)+'s linear infinite';
  vortex.appendChild(vi1);
  // 漩涡内圈2 — 实线发光
  var vi2=document.createElement('div');
  vi2.style.cssText='position:absolute;inset:26%;border-radius:50%;border:1px solid '+c+'33;box-shadow:0 0 10px '+c+'22,inset 0 0 8px '+c+'11;animation:spin '+(cfg.vortDur*0.6)+'s linear infinite';
  vortex.appendChild(vi2);
  // 漩涡内圈3 — 最深层
  var vi3=document.createElement('div');
  vi3.style.cssText='position:absolute;inset:40%;border-radius:50%;border:0.5px dashed '+c+'22;animation:spinR '+(cfg.vortDur*0.4)+'s linear infinite';
  vortex.appendChild(vi3);
  // 中心深渊点
  var abyss=document.createElement('div');
  abyss.style.cssText='position:absolute;inset:38%;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,0.7),rgba(0,0,0,0.3) 50%,transparent 75%)';
  vortex.appendChild(abyss);

  box.appendChild(vortex);

  // ═══ 深层雾 ═══
  var fogSz=vSz+12;
  var fog=document.createElement('div');
  pc(fog,fogSz,fogSz);
  fog.style.cssText+='border-radius:50%;background:radial-gradient(circle,'+c+(isOpen?'2a':'15')+','+c+'06 40%,transparent 60%);filter:blur(6px);pointer-events:none;z-index:2;animation:fog'+i+' 3.5s ease-in-out infinite '+(-i*0.5)+'s';
  box.appendChild(fog);
  css+='@keyframes fog'+i+'{0%,100%{opacity:'+cfg.fogOp+';transform:scale(1)}50%{opacity:'+(cfg.fogOp+0.3)+';transform:scale(1.1)}}';

  // ═══ 降束 — 上方 ═══
  var beam=document.createElement('div');
  beam.style.cssText='position:absolute;left:50%;margin-left:-'+(cfg.beamW/2)+'px;top:'+(-cfg.beamH-8)+'px;width:'+cfg.beamW+'px;height:'+cfg.beamH+'px;border-radius:2px;background:linear-gradient(180deg,'+c+','+c2+'88,transparent);box-shadow:0 0 '+(cfg.beamW*1.5)+'px '+c+'66,0 0 '+(cfg.beamW*2.5)+'px '+c+'22;z-index:4;animation:beam'+i+' '+(isOpen?1.5:2.2)+'s ease-in-out infinite '+(-i*0.3)+'s';
  // 顶端爆点
  beam.innerHTML='<div style="position:absolute;top:-8px;left:50%;margin-left:-8px;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,'+c+','+c+'55 40%,transparent 70%);box-shadow:0 0 14px '+c+',0 0 28px '+c+'88;animation:bSpark '+(isOpen?1.2:1.8)+'s ease-in-out infinite '+(-i*0.3)+'s"></div>';
  box.appendChild(beam);
  css+='@keyframes beam'+i+'{0%,100%{opacity:'+(isOpen?0.7:0.4)+';height:'+cfg.beamH+'px;width:'+cfg.beamW+'px}50%{opacity:1;height:'+(cfg.beamH+14)+'px;width:'+(cfg.beamW+3)+'px}}';
  css+='@keyframes bSpark{0%,100%{opacity:0.5;transform:scale(0.8)}50%{opacity:1;transform:scale('+(isOpen?1.6:1.3)+')}}';

  // ═══ 降束 — 下方(从底部向上) ═══
  var beamB=document.createElement('div');
  var bBh=Math.round(cfg.beamH*0.6);
  beamB.style.cssText='position:absolute;left:50%;margin-left:-'+(Math.max(cfg.beamW-1,2)/2)+'px;bottom:'+(-bBh-4)+'px;width:'+Math.max(cfg.beamW-1,2)+'px;height:'+bBh+'px;border-radius:2px;background:linear-gradient(0deg,'+c2+'88,'+c+'44,transparent);box-shadow:0 0 '+(cfg.beamW)+'px '+c2+'55;z-index:4;animation:beamB'+i+' 2.5s ease-in-out infinite '+(-i*0.4)+'s';
  box.appendChild(beamB);
  css+='@keyframes beamB'+i+'{0%,100%{opacity:0.3;height:'+bBh+'px}50%{opacity:0.7;height:'+(bBh+8)+'px}}';

  // ═══ 门柱 ═══
  var pilH=Math.round(boxSz*0.7);
  [[-boxSz/2-7,c,c2],[boxSz/2+2,c2,c]].forEach(function(pd,pi){
    var pil=document.createElement('div');
    pil.style.cssText='position:absolute;width:4px;height:'+pilH+'px;left:calc(50% + '+pd[0]+'px);top:calc(50% - '+pilH/2+'px);border-radius:2px;background:linear-gradient(180deg,'+pd[1]+',transparent 35%,transparent 65%,'+pd[2]+');box-shadow:0 0 5px '+c+'33;z-index:5';
    // 柱顶亮点
    pil.innerHTML='<div style="position:absolute;top:-4px;left:-3px;width:10px;height:10px;border-radius:50%;background:'+pd[1]+';box-shadow:0 0 8px '+pd[1]+',0 0 14px '+pd[1]+'88;animation:pDot '+(isOpen?1.2:1.8)+'s ease-in-out infinite '+(-i*0.4-pi*0.6)+'s"></div><div style="position:absolute;bottom:-4px;left:-2px;width:8px;height:8px;border-radius:50%;background:'+pd[2]+';box-shadow:0 0 6px '+pd[2]+',0 0 10px '+pd[2]+'66;animation:pDot '+(isOpen?1.2:1.8)+'s ease-in-out infinite '+(-i*0.4-pi*0.6-0.9)+'s"></div>';
    // 柱上脉冲扫光
    var sweep=document.createElement('div');
    sweep.style.cssText='position:absolute;left:0;width:100%;height:4px;background:'+c+';box-shadow:0 0 6px '+c+';border-radius:2px;animation:pilSweep '+(2+i*0.3)+'s ease-in-out infinite '+(-pi)+'s';
    pil.appendChild(sweep);
    box.appendChild(pil);
  });
  css+='@keyframes pDot{0%,100%{opacity:0.3;transform:scale(0.75)}50%{opacity:1;transform:scale(1.4)}}';
  css+='@keyframes pilSweep{0%{top:0;opacity:0}15%{opacity:0.6}85%{opacity:0.4}100%{top:calc(100% - 4px);opacity:0}}';

  // ═══ 吸入粒子 ═══
  for(var k=0;k<cfg.sparkN;k++){
    var angle=rn(0,Math.PI*2);
    var dist=rn(35,55);
    var sk=document.createElement('div');
    var skSz=rn(1.5,3);
    sk.style.cssText='position:absolute;width:'+skSz+'px;height:'+skSz+'px;border-radius:50%;left:50%;top:50%;margin-left:-1px;margin-top:-1px;pointer-events:none;z-index:4';
    sk.innerHTML='<div style="width:100%;height:100%;border-radius:50%;background:'+c+';box-shadow:0 0 '+(skSz*2)+'px '+c+',0 0 '+(skSz*4)+'px '+c+'55;animation:suck '+(1+rn(0,1.5))+'s ease-in infinite '+(-rn(0,3))+'s;--sx:'+(Math.cos(angle)*dist)+'px;--sy:'+(Math.sin(angle)*dist)+'px"></div>';
    box.appendChild(sk);
  }
  css+='@keyframes suck{0%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(1.5)}25%{opacity:0.9}100%{opacity:0;transform:translate(0,0) scale(0)}}';

  // ═══ W14 不稳定 — 破碎感强化 ═══
  if(i===3){
    box.style.animation='w14Shake 3s ease-in-out infinite';
    css+='@keyframes w14Shake{0%,100%{transform:translate(0,0)}8%{transform:translate(-1.5px,1px)}18%{transform:translate(1px,-1px)}28%{transform:translate(-0.5px,-1.5px)}40%{transform:translate(1.5px,0.5px)}52%{transform:translate(-1px,1.5px)}65%{transform:translate(0.5px,-0.5px)}78%{transform:translate(-1.5px,-0.5px)}90%{transform:translate(1px,0.5px)}}';
    for(var f=0;f<8;f++){var frag=document.createElement('div');var fA=rn(0,Math.PI*2);var fD=rn(boxSz*0.42,boxSz*0.65);var fSz=rn(1.5,4);frag.style.cssText='position:absolute;left:calc(50% + '+(Math.cos(fA)*fD)+'px);top:calc(50% + '+(Math.sin(fA)*fD)+'px);width:'+fSz+'px;height:'+rn(1,2)+'px;background:'+c+';box-shadow:0 0 '+(fSz+2)+'px '+c+',0 0 '+(fSz+6)+'px '+c+'55;border-radius:1px;transform:rotate('+rn(0,360)+'deg);pointer-events:none;animation:w14Frag '+(0.6+rn(0,1.2))+'s ease-in-out infinite alternate '+(-rn(0,3))+'s';box.appendChild(frag)}
    css+='@keyframes w14Frag{0%{opacity:0;transform:scale(0.5)}30%{opacity:0.8}70%{opacity:0.4}100%{opacity:0;transform:scale(1.2)}}';
    for(var g=0;g<6;g++){var glow=document.createElement('div');var gA=rn(0,Math.PI*2);var gR=rn(boxSz*0.35,boxSz*0.55);glow.style.cssText='position:absolute;width:'+rn(2,3.5)+'px;height:'+rn(2,3.5)+'px;border-radius:50%;left:calc(50% + '+(Math.cos(gA)*gR)+'px);top:calc(50% + '+(Math.sin(gA)*gR)+'px);background:'+c+';box-shadow:0 0 6px '+c+',0 0 12px '+c+'66;pointer-events:none;animation:w14Glow '+(1.5+rn(0,2))+'s ease-in-out infinite '+(-rn(0,3))+'s';box.appendChild(glow)}
    css+='@keyframes w14Glow{0%,100%{opacity:0;transform:scale(0.5)}30%{opacity:0.7;transform:scale(1.2)}60%{opacity:0.3}90%{opacity:0;transform:scale(0.8)}}';
    arch1.style.borderStyle='dashed';
    var flicker=document.createElement('div');flicker.style.cssText='position:absolute;inset:0;border-radius:50%;background:'+c+'11;animation:w14Flicker 0.3s steps(2) infinite;pointer-events:none;z-index:4';vortex.appendChild(flicker);
    css+='@keyframes w14Flicker{0%{opacity:0}25%{opacity:0.4}50%{opacity:0}75%{opacity:0.25}100%{opacity:0}}';
  }

  // ═══ 数字 ═══
  var num=document.createElement('div');
  num.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10';
  var fs=Math.round(15+p*6);
  num.innerHTML='<span style="font-family:Orbitron,monospace;font-size:'+fs+'px;font-weight:900;color:#fff;text-shadow:0 0 12px '+c+',0 0 28px '+c+'55,0 2px 3px rgba(0,0,0,0.8);-webkit-text-stroke:0.3px rgba(255,255,255,0.1)">'+fmt(v)+'</span>';
  box.appendChild(num);

  unit.appendChild(box);

  // ═══ 底部符文光圈 ═══
  var rune=document.createElement('div');
  rune.style.cssText='width:110%;height:8px;position:relative;margin-top:2px';
  rune.innerHTML='<div style="position:absolute;inset:0;background:radial-gradient(ellipse,'+c+(isOpen?'55':'33')+',transparent 70%);animation:runeG 2.5s ease-in-out infinite '+(-i*0.5)+'s"></div>';
  css+='@keyframes runeG{0%,100%{opacity:0.25;transform:scaleX(1)}50%{opacity:0.7;transform:scaleX(1.12)}}';
  unit.appendChild(rune);

  // ═══ 标签 ═══
  var lbl=document.createElement('div');
  lbl.style.cssText='text-align:center;margin-top:4px;min-width:100px';
  lbl.innerHTML='<div style="font-family:Orbitron,monospace;font-size:17px;font-weight:700;color:'+c+';text-shadow:0 0 8px '+c+'66;letter-spacing:2px;line-height:1.2">'+fmt(v)+'</div><div style="font-family:Orbitron,monospace;font-size:10px;color:#8aa0c0;letter-spacing:1.5px;margin-top:3px;line-height:1">'+D.labels[i]+'</div><div style="font-family:Orbitron,monospace;font-size:8px;color:'+c+'88;letter-spacing:2px;margin-top:2px;line-height:1">'+cfg.phase.toUpperCase()+'</div>';
  unit.appendChild(lbl);

  row.appendChild(unit);
});

sc.appendChild(row);

// ── 场景粒子 40颗 ──
for(var i=0;i<40;i++){
  var c=C1[i%4];
  var pt=document.createElement('div');
  pt.style.cssText='position:absolute;width:'+(1+rn(0,2))+'px;height:'+(1+rn(0,2))+'px;border-radius:50%;left:'+rn(2,96)+'%;top:'+rn(2,96)+'%;background:'+c+';box-shadow:0 0 '+(3+rn(0,5))+'px '+c+';pointer-events:none;z-index:1;animation:scP '+(3+rn(0,4))+'s ease-in-out infinite '+(-rn(0,5))+'s';
  sc.appendChild(pt);
}
css+='@keyframes scP{0%,100%{opacity:0.06}30%{opacity:0.4}60%{opacity:0.1}85%{opacity:0.35}}';

// 注入所有动画
var st=document.createElement('style');
st.textContent=css;
document.head.appendChild(st);
</script>
</body>
